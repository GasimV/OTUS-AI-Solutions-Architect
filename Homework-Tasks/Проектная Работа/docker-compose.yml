name: secure-graphrag

services:
  api:
    build:
      context: ./services/api
    env_file:
      - .env
    environment:
      STORE_BACKEND: ${STORE_BACKEND:-external}
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-corp_chunks}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-change-me}
      LLM_BASE_URL: http://vllm:8000/v1
      LLM_MODEL: ${LLM_MODEL:-local-qwen}
      LLM_MODE: ${LLM_MODE:-vllm}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-180}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-220}
      EMBEDDING_BACKEND: ${EMBEDDING_BACKEND:-hash}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-384}
      EMBEDDING_MODEL_PATH: ${EMBEDDING_MODEL_PATH:-/models/embeddings/bge-m3}
      EMBEDDING_LOCAL_FILES_ONLY: ${EMBEDDING_LOCAL_FILES_ONLY:-1}
    ports:
      - "8080:8080"
    depends_on:
      qdrant:
        condition: service_started
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - dmz
      - internal
      - model
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - internal
      - admin
    restart: unless-stopped

  neo4j:
    image: neo4j:5.26-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-change-me}
      NEO4J_server_memory_heap_initial__size: 1G
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache_size: 1G
      NEO4J_dbms_security_auth__minimum__password__length: 8
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p '${NEO4J_PASSWORD:-change-me}' 'RETURN 1' >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - internal
      - admin
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-graphrag}
      POSTGRES_USER: ${POSTGRES_USER:-graphrag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-graphrag}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal
      - admin
    restart: unless-stopped

  vllm:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:latest}
    profiles: ["gpu"]
    command:
      - --model
      - /models/qwen3-awq
      - --served-model-name
      - local-qwen
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --quantization
      - awq
      - --gpu-memory-utilization
      - "${VLLM_GPU_MEMORY_UTILIZATION:-0.88}"
      - --max-model-len
      - "${VLLM_MAX_MODEL_LEN:-8192}"
      - --kv-cache-dtype
      - "${VLLM_KV_CACHE_DTYPE:-auto}"
      - --enable-prefix-caching
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
    gpus: all
    shm_size: "8gb"
    volumes:
      - ./models:/models:ro
    ports:
      - "8000:8000"
    networks:
      - model
      - admin
    restart: unless-stopped

  vault:
    image: hashicorp/vault:1.18
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN_ID:-root-token-change-me}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    networks:
      - internal
      - admin
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - internal
      - admin
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - internal
      - admin
    restart: unless-stopped

networks:
  dmz:
    driver: bridge
  internal:
    driver: bridge
    internal: true
  model:
    driver: bridge
    internal: true
  admin:
    driver: bridge

volumes:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  postgres_data:
  prometheus_data:
  grafana_data:
