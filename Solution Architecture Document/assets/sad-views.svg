<svg xmlns="http://www.w3.org/2000/svg" width="500" height="489" viewBox="0 0 500 489" role="img" aria-labelledby="title desc">
  <title id="title">Solution Architecture Document Views</title>
  <desc id="desc">A central Solution Architecture Document Views circle surrounded by Business, Logical, Process, Deployment, Implementation, Data, and Operational views.</desc>
  <rect width="500" height="489" fill="#ffffff"/>
  <g font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="17" text-anchor="middle" dominant-baseline="middle">
    <circle cx="162" cy="89" r="72" fill="#f3caca" stroke="#bf5c57"/>
    <text x="162" y="90">Operational View</text>

    <circle cx="310" cy="76" r="72" fill="#f3caca" stroke="#bf5c57"/>
    <text x="310" y="77">Business View</text>

    <circle cx="420" cy="191" r="72" fill="#f3caca" stroke="#bf5c57"/>
    <text x="420" y="190">Logical View</text>

    <circle cx="412" cy="337" r="72" fill="#f3caca" stroke="#bf5c57"/>
    <text x="412" y="338">Process View</text>

    <circle cx="282" cy="414" r="72" fill="#f3caca" stroke="#bf5c57"/>
    <text x="282" y="408">Deployment</text>
    <text x="282" y="429">View</text>

    <circle cx="134" cy="362" r="72" fill="#f3caca" stroke="#bf5c57"/>
    <text x="134" y="356">Implementation</text>
    <text x="134" y="377">View</text>

    <circle cx="82" cy="226" r="72" fill="#f3caca" stroke="#bf5c57"/>
    <text x="82" y="223">Data View</text>

    <circle cx="256" cy="241" r="100" fill="#b96761" stroke="#9d3f37"/>
    <text x="256" y="235">Solution Architecture</text>
    <text x="256" y="256">Document Views</text>
  </g>
</svg>
